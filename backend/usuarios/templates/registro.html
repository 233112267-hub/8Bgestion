{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body data-page="registro">

<section class="formulario">

    <form id="registerForm">
        <div class="form-head">
            <h1>Registro</h1>
            <p>Completa tus datos para crear tu usuario.</p>
        </div>

        <div class="switch" id="typeSwitch" role="button" tabindex="0" aria-label="Cambiar tipo de usuario"></div>

        <div class="fields-grid">
            <input id="registerName" type="text" placeholder="Nombre">
            <input id="registerEmail" type="email" placeholder="Correo">
            <input id="registerUser" type="text" placeholder="Usuario">
            <input id="registerCareer" type="text" placeholder="Carrera">
            <input id="registerPassword" type="password" placeholder="Contraseña">
        </div>

        <div class="codigo">
            <input class="code-digit" type="text" maxlength="1">
            <input class="code-digit" type="text" maxlength="1">
            <input class="code-digit" type="text" maxlength="1">
            <input class="code-digit" type="text" maxlength="1">
            <input class="code-digit" type="text" maxlength="1">
        </div>

        <input id="registerCode" type="text" placeholder="Código completo" readonly>
        <button type="submit">Registrar</button>
        <p id="registerMessage" class="message"></p>
    </form>

</section>

<script src="app.js" defer></script>
</body>
</html>
