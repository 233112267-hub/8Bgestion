{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Asesorado</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body data-page="registro">

<section class="formulario">

    <form method="POST">

        {% csrf_token %}

        <div class="form-head">
            <h1>Registro Asesorado</h1>
            <p>Completa tus datos para registrarte como asesorado.</p>
        </div>

        <div class="fields-grid">

            <input
                name="nombre"
                type="text"
                placeholder="Nombre completo"
                required
            >

            <input
                name="email"
                type="email"
                placeholder="Correo"
                required
            >

            <input
                name="usuario"
                type="text"
                placeholder="Usuario"
                required
            >

            <input
                name="password"
                type="password"
                placeholder="Contraseña"
                required
            >

        </div>

        <button type="submit">
            Registrarse
        </button>

        <p class="message">
            {{ mensaje }}
        </p>

        <p>
            ¿Ya tienes cuenta?
            <a href="/">Iniciar sesión</a>
        </p>

    </form>

</section>

</body>
</html>
