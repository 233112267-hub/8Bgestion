<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="center" data-page="login">

<div class="login-box">

    <div class="logo"></div>

    <form id="loginForm">
        <h1>Iniciar sesión</h1>
        <input id="loginUser" type="text" placeholder="Usuario" autocomplete="username">
        <input id="loginPassword" type="password" placeholder="Contraseña" autocomplete="current-password">
        <input id="loginCode" type="text" placeholder="Código">
        <button type="submit">Login</button>
        <p id="loginMessage" class="message"></p>
        <p class="login-footer">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
    </form>

</div>

<script src="app.js" defer></script>
</body>
</html>
